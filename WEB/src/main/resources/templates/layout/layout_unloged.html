<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:lang="#{idioma}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title layout:title-pattern="$LAYOUT_TITLE - Gertuko"></title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/header_unloged.css}">
  <link rel="stylesheet" th:href="@{/css/footer.css}" />
  <link rel="icon" th:href="@{/images/logo-gertuko.png}" type="image/png">
</head>

<body  class="d-flex flex-column min-vh-100">

  <th:block th:replace="~{includes/header_unlog :: headerFragment}"></th:block>

  <main layout:fragment="content"  class="flex-fill d-flex flex-column">
    <!-- Aquí va el contenido específico de cada página -->
  </main>

  <th:block th:replace="~{includes/footer :: footerFragment}"></th:block>
  
  <script th:src="@{/js/imagenTexto.js}"></script>
  <script th:src="@{/js/estadistica.js}"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
