<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout_unloged}"
      th:lang="#{idioma}">
<head>
  <link rel="stylesheet" th:href="@{/css/form-style.css}">
  <title>Login</title>
</head>

<body>
  <div layout:fragment="content"class="main-content">
    <div class="login-container">
      <div class="card login-card">
        <div class="card-body">
          <h2 class="card-title text-center mb-4" th:text="#{index.msgLogin}">Login</h2>

          <!-- Mensajes -->
          <div th:if="${loginError}" class="alert alert-danger">
            <span th:text="#{login.error}"></span>
          </div>
          <div th:if="${success}" class="alert alert-success">
            <span th:text="#{success}"></span>
          </div>
          <div th:if="${info}" class="alert alert-success">
            <span th:text="#{login.creado}"></span>
          </div>

          <!-- Formulario -->
          <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            
            <div class="mb-3">
              <label for="username" class="form-label" th:text="#{login.nombreLogin}">Usuario</label>
              <input type="text" class="form-control" id="username" name="username" required>
            </div>

            <div class="mb-3">
              <label for="password" class="form-label" th:text="#{login.passwordLogin}">Contraseña</label>
              <input type="password" class="form-control" id="password" name="password" required>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary" th:text="#{login.btnLogin}">Ingresar</button>
            </div>
          </form>

          <div class="text-center mt-3">
            <a href="/forgot_password" th:text="#{login.forgot}"></a>
          </div>

          <div class="text-center mt-3">
            <span th:text="#{login.registerMessage}"></span>
            <a href="/registro" th:text="#{login.btnRegister}"></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
