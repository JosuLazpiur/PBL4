<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout_unloged}">
<head>
  <title th:text="#{title.establecer}">Establecer</title>
  <link rel="stylesheet" th:href="@{/css/set_new_password.css}" />
</head>

<body>
  <div layout:fragment="content">
    <div class="center-wrapper">
      <div class="main-container">
        <h2 class="text-center" th:text="#{registro.titleNew}"></h2>

        <div th:if="${errorUsuarioNo}" class="alert alert-danger">
          <span th:text="#{errorUsuarioNo}"></span>
        </div>
        <div th:if="${errorContrasena}" class="alert alert-danger">
          <span th:text="#{errorContrasena}"></span>
        </div>

        <form th:action="@{/set_new_password}" method="post">
          <input type="hidden" name="email" th:value="${email}" />

          <div class="mb-3">
            <label for="newPassword" class="form-label" th:text="#{new.nueva}">Nueva contraseña</label>
            <input type="password" class="form-control" id="newPassword" name="newPassword" required>
          </div>
          <button type="submit" class="btn btn-primary" th:text="#{new.cambiar}"></button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
