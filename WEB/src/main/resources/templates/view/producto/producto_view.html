<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:lang="#{idioma}"
      layout:decorate="~{layout/layout_loged}">

<head>
    <title th:text="${producto.nombre}">Detalle Producto</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" th:href="@{/css/producto.css}" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>

<body>
    <div layout:fragment="content">
        <div class="main-container">
            <!-- Cabecera del producto -->
            <div class="producto-header">
                <div class="row">
                    <!-- Galería de imágenes -->
                    <div class="col-lg-6">
                        <div class="producto-galeria">
                            <img th:src="@{'/uploads/productos/' + ${producto.imagen}}"
                                alt="Imagen del producto"
                                class="producto-imagen">
                        </div>
                    </div>
                    
                    <!-- Detalles del producto -->
                    <div class="col-lg-6">
                        <div class="producto-detalles">
                            <div class="producto-info">
                                <h1 th:text="${producto.nombre}" class="producto-titulo"></h1>                        
                                <div class="producto-estado">
                                <span class="badge-estado"
                                        th:text="#{${producto.estado}}"
                                        th:classappend="${producto.estado.name() == 'DISPONIBLE'} ? ' badge-disponible' : ' badge-pendiente'">
                                </span>
                                </div>     
                                <div class="producto-descripcion">
                                    <h5 th:text="#{producto.descripcion}">Descripción</h5>
                                    <p th:text="${producto.descripcion}"></p>
                                </div>
                                <div class="producto-precio">
                                    <p th:text="#{producto.precio} + ' ' + ${producto.precio} + '€'"></p>
                                </div>
                            </div>
                            
                            <!-- Info vendedor -->
                            <div class="vendedor-section">
                                <div class="vendedor-info">
                                    <h5 th:text="#{producto.vendedor}">Vendedor</h5>
                                    <div class="vendedor-datos">
                                        <p class="vendedor-nombre" th:text="${producto.vendedor.nombre + ' ' + producto.vendedor.apellido}"></p>
                                    </div>
                                </div>
                                <a th:href="@{'/chat/' + ${producto.vendedor.usuarioId}}" 
                                class="btn btn-contactar" 
                                th:if="${session.user.usuarioId != producto.vendedor.usuarioId}">
                                    <i class="bi bi-chat-dots me-2"></i>Contactar con el vendedor
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Sección de valoraciones -->
            <div class="valoraciones-container">
                <h3 class="valoraciones-titulo" th:text="#{valoracion.title}">Valoraciones</h3>
                
                <div th:if="${#lists.isEmpty(valoraciones)}" class="alert alert-info">
                    <p tx:text="#{valoracion.noValoracion}">Aún no hay valoraciones para este producto.</p>
                </div>
                
                <!-- Listado de valoraciones -->
                <div th:each="val : ${valoraciones}" class="valoracion-card">
                    <div class="valoracion-header">
                        <div class="valoracion-usuario">
                            <strong th:text="${val.usuario.username}"></strong>
                            <small th:text="${#temporals.format(val.fecha, 'dd/MM/yyyy HH:mm')}"></small>
                        </div>
                        <div class="valoracion-estrellas">
                            <span th:each="i : ${#numbers.sequence(1, 5)}">
                                <span th:if="${i <= val.estrellas}">★</span>
                                <span th:if="${i > val.estrellas}">☆</span>
                            </span>
                        </div>
                    </div>
                    <p th:if="${val.comentario}" th:text="${val.comentario}" class="valoracion-comentario"></p>
                </div>
                
                <!-- Formulario para nueva valoración -->
                <div th:if="${session.user.usuarioId != producto.vendedor.usuarioId}" class="nueva-valoracion">
                    <h4 th:text="#{valoracion.titleAñadir}">Añadir tu valoración</h4>
                    <form th:action="@{'/producto/' + ${producto.productoId} + '/valorar'}" method="post" class="form-valoracion">
                        <div class="rating-container">
                            <div class="stars-container" id="rating-stars">
                                <i class="bi bi-star-fill rating-star" data-value="1"></i>
                                <i class="bi bi-star-fill rating-star" data-value="2"></i>
                                <i class="bi bi-star-fill rating-star" data-value="3"></i>
                                <i class="bi bi-star-fill rating-star" data-value="4"></i>
                                <i class="bi bi-star-fill rating-star" data-value="5"></i>
                            </div>
                            <input type="hidden" name="estrellas" id="estrellas" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="comentario" th:text="#{valoracion.comentario}">Comentario (opcional)</label>
                            <textarea name="comentario" id="comentario" rows="4" 
                                    th:placeholder="#{valoracion.placeholder}"></textarea>
                        </div>
                        <button type="submit" class="btn btn-enviar" th:text="#{valoracion.publicas}">
                            <i class="bi bi-send me-2"></i>Publicar valoración
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
